services:
  mkdownloader:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Décommentez et choisissez un mot de passe AVANT d'exposer sur Internet.
      # APP_PASSWORD: "changez-moi"
      RETENTION_MINUTES: "180"
      MAX_CONCURRENT_JOBS: "3"
      YTDLP_AUTO_UPDATE: "1"
    volumes:
      - downloads:/data
      # Pour les contenus privés Instagram/Facebook (voir README) :
      # - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped

volumes:
  downloads:
