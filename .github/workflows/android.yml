name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Build release APKs (les deux éditions)
        run: gradle -p android :app:assembleRelease

      - name: Rename APKs
        run: |
          cp android/app/build/outputs/apk/mk/release/app-mk-release.apk MKDownloader.apk
          cp android/app/build/outputs/apk/analyste/release/app-analyste-release.apk LAnalyste2027.apk
          cp android/app/build/outputs/apk/tv/release/app-tv-release.apk MKTv.apk

      - name: Génère update.json (mise à jour in-app)
        run: |
          VC=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' android/app/build.gradle.kts | head -1)
          VN=$(grep -oP 'versionName\s*=\s*"\K[^"]+' android/app/build.gradle.kts | head -1)
          printf '{"versionCode":%s,"versionName":"%s"}\n' "$VC" "$VN" > update.json
          cat update.json

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            MKDownloader.apk
            LAnalyste2027.apk
            MKTv.apk

      # Publie (ou remplace) les APK dans une release "latest" facile à
      # télécharger depuis un téléphone.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MKDownloader — dernier APK"
          body: "APK Android compilés automatiquement depuis la branche main. MKDownloader.apk = app grand public (mobile) ; LAnalyste2027.apk = outil d'analyse neutre (app séparée) ; MKTv.apk = variante Android TV / box (interface Leanback à la télécommande). Installez celui voulu (autorisez les sources inconnues si demandé)."
          files: |
            MKDownloader.apk
            LAnalyste2027.apk
            MKTv.apk
            update.json
