name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Build release APK
        run: gradle -p android :app:assembleRelease

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk MKDownloader.apk

      - uses: actions/upload-artifact@v4
        with:
          name: MKDownloader-apk
          path: MKDownloader.apk

      # Publie (ou remplace) l'APK dans une release "latest" facile à
      # télécharger depuis un téléphone.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MKDownloader — dernier APK"
          body: "APK Android compilé automatiquement depuis la branche main. Téléchargez MKDownloader.apk ci-dessous et installez-le (autorisez les sources inconnues si demandé)."
          files: MKDownloader.apk
